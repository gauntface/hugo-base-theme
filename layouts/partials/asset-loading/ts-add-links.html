{{- $options := dict "params" (dict "Environment" hugo.Environment) -}}

{{- range $.Files -}}
{{- $asset := partial "asset-loading/bt-path-to-asset" (dict "Path" .) -}}
{{ $script := $asset | js.Build $options }}
<script type="module" type="text/javascript" src="{{ $script.RelPermalink }}"></script>
{{- end -}}
